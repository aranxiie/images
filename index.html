<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Gallery</title>

<style>
body {
  background: #141414;
  color: white;
  font-family: Arial, sans-serif;
  padding: 40px;
}

h2 {
  margin-bottom: 15px;
}

/* SECTION */
.gallery-section {
  margin-bottom: 80px;
}

/* MAIN DISPLAY */
.gallery-main {
  width: 100%;
  height: 500px;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.gallery-main img,
.gallery-main video {
  max-width: 100%;
  max-height: 100%;
}

/* THUMBNAILS */
.gallery-thumbnails-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
}

.gallery-thumb-item {
  min-width: 180px;
  height: 100px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  border: 3px solid transparent;
  transition: 0.3s;
  border-radius: 6px;
}

.gallery-thumb-item:hover {
  transform: scale(1.1);
}

.thumb-active {
  border-color: red;
}
</style>
</head>

<script>
function swapImg(mainId, el) {
  const main = document.getElementById(mainId);
  const bg = el.style.backgroundImage;
  const url = bg.slice(5, -2);

  if (url.endsWith(".mp4")) {
    main.innerHTML = `<video src="${url}" controls autoplay></video>`;
  } else {
    main.innerHTML = `<img src="${url}">`;
  }

  const thumbs = el.parentElement.querySelectorAll(".gallery-thumb-item");
  thumbs.forEach(t => t.classList.remove("thumb-active"));
  el.classList.add("thumb-active");
}
</script>
